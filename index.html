<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort Explorer | Aprendendo Algoritmos</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #818cf8;
            --accent: #f472b6;
            --success: #4ade80;
            --warning: #fbbf24;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            max-width: 800px;
        }

        h1 {
            font-family: 'Fira Code', monospace;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        p.subtitle {
            color: var(--text-dim);
            line-height: 1.6;
        }

        .controls {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--secondary);
            font-weight: bold;
        }

        input, select {
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: white;
            padding: 0.6rem;
            border-radius: 6px;
            outline: none;
            font-family: 'Fira Code', monospace;
        }

        button {
            background: var(--primary);
            color: var(--bg-color);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        button.secondary {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .main-container {
            display: flex;
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .sort-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            flex: 1;
            min-width: 320px;
            display: none; /* Hidden by default */
        }

        .sort-card.active {
            display: flex;
            flex-direction: column;
        }

        .sort-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .sort-name {
            font-family: 'Fira Code', monospace;
            color: var(--accent);
            font-weight: bold;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--border);
        }

        .numbers-display {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1.5rem;
            min-height: 80px;
            align-items: center;
            flex-wrap: wrap;
        }

        .num-box {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .num-box.comparing {
            border-color: var(--warning);
            background: rgba(251, 191, 36, 0.1);
            transform: translateY(-5px);
        }

        .num-box.swapping {
            border-color: var(--accent);
            background: rgba(244, 114, 182, 0.2);
            scale: 1.1;
        }

        .num-box.sorted {
            border-color: var(--success);
            color: var(--success);
        }

        .explanation {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
            min-height: 80px;
            border-left: 4px solid var(--primary);
        }

        .code-style {
            font-family: 'Fira Code', monospace;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .highlight-code {
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .controls { flex-direction: column; align-items: stretch; }
            body { padding: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>{ sort_explorer }</h1>
        <p class="subtitle">Descubra como os computadores organizam dados de forma visual e interativa. Criado para mentes curiosas do 8º ano.</p>
    </header>

    <div class="controls">
        <div class="input-group">
            <label>Nº de Itens</label>
            <input type="number" id="listSize" value="8" min="3" max="15">
        </div>
        <div class="input-group">
            <label>Algoritmo</label>
            <select id="algorithm">
                <option value="bubble">Bubble Sort</option>
                <option value="insertion">Insertion Sort</option>
                <option value="selection">Selection Sort</option>
                <option value="compare">Comparar Todos</option>
            </select>
        </div>
        <button onclick="prepareSimulation()">Gerar e Iniciar</button>
    </div>

    <div class="main-container" id="visualizerContainer">
        <!-- Os cards de sort entrarão aqui via JavaScript -->
    </div>

    <script>
        let isRunning = false;
        let originalList = [];

        // Velocidade da animação (ms)
        const SPEED = 800;

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function generateRandomList(size) {
            return Array.from({ length: size }, () => Math.floor(Math.random() * 90) + 10);
        }

        function createSortCard(id, title) {
            return `
                <div class="sort-card active" id="card-${id}">
                    <div class="sort-header">
                        <span class="sort-name">// ${title}</span>
                        <span class="status-badge" id="status-${id}">Aguardando</span>
                    </div>
                    <div class="numbers-display" id="display-${id}"></div>
                    <div class="explanation" id="exp-${id}">
                        Clique em gerar para iniciar a explicação passo a passo.
                    </div>
                </div>
            `;
        }

        function renderNumbers(id, arr, activeIndices = [], swappingIndices = [], sortedIndices = []) {
            const container = document.getElementById(`display-${id}`);
            container.innerHTML = '';
            arr.forEach((val, idx) => {
                const box = document.createElement('div');
                box.className = 'num-box';
                box.textContent = val;
                if (swappingIndices.includes(idx)) box.classList.add('swapping');
                else if (activeIndices.includes(idx)) box.classList.add('comparing');
                if (sortedIndices.includes(idx)) box.classList.add('sorted');
                container.appendChild(box);
            });
        }

        async function prepareSimulation() {
            if (isRunning) return;
            
            const size = parseInt(document.getElementById('listSize').value);
            const algo = document.getElementById('algorithm').value;
            const container = document.getElementById('visualizerContainer');
            
            if (size > 15) { alert("Máximo de 15 itens para melhor visualização!"); return; }

            isRunning = true;
            container.innerHTML = '';
            originalList = generateRandomList(size);

            if (algo === 'compare') {
                container.innerHTML += createSortCard('bubble', 'Bubble Sort');
                container.innerHTML += createSortCard('selection', 'Selection Sort');
                container.innerHTML += createSortCard('insertion', 'Insertion Sort');
                
                // Roda as 3 ao mesmo tempo
                Promise.all([
                    bubbleSort([...originalList], 'bubble'),
                    selectionSort([...originalList], 'selection'),
                    insertionSort([...originalList], 'insertion')
                ]).then(() => isRunning = false);
            } else {
                const names = {bubble: 'Bubble Sort', selection: 'Selection Sort', insertion: 'Insertion Sort'};
                container.innerHTML += createSortCard(algo, names[algo]);
                if(algo === 'bubble') await bubbleSort([...originalList], 'bubble');
                if(algo === 'selection') await selectionSort([...originalList], 'selection');
                if(algo === 'insertion') await insertionSort([...originalList], 'insertion');
                isRunning = false;
            }
        }

        async function updateExp(id, msg) {
            document.getElementById(`exp-${id}`).innerHTML = `<span class="code-style">> </span>${msg}`;
        }

        // --- ALGORITMOS ---

        async function bubbleSort(arr, id) {
            const n = arr.length;
            let sortedIndices = [];
            document.getElementById(`status-${id}`).textContent = "Ordenando...";

            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    await updateExp(id, `Comparando <span class="highlight-code">${arr[j]}</span> e <span class="highlight-code">${arr[j+1]}</span>. O maior "flutua" para a direita.`);
                    renderNumbers(id, arr, [j, j + 1], [], sortedIndices);
                    await sleep(SPEED);

                    if (arr[j] > arr[j + 1]) {
                        await updateExp(id, `<span class="highlight-code">${arr[j]}</span> é maior que <span class="highlight-code">${arr[j+1]}</span>, trocando de lugar!`);
                        renderNumbers(id, arr, [], [j, j + 1], sortedIndices);
                        await sleep(SPEED);
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                        renderNumbers(id, arr, [j, j + 1], [], sortedIndices);
                        await sleep(SPEED);
                    }
                }
                sortedIndices.push(n - 1 - i);
                renderNumbers(id, arr, [], [], sortedIndices);
            }
            await updateExp(id, "Lista ordenada! O maior elemento de cada iteração foi colocado ao final.");
            document.getElementById(`status-${id}`).textContent = "Concluído";
        }

        async function selectionSort(arr, id) {
            const n = arr.length;
            let sortedIndices = [];
            document.getElementById(`status-${id}`).textContent = "Ordenando...";

            for (let i = 0; i < n; i++) {
                let minIdx = i;
                await updateExp(id, `Buscando o menor valor a partir da posição ${i}...`);
                
                for (let j = i + 1; j < n; j++) {
                    renderNumbers(id, arr, [j, minIdx], [], sortedIndices);
                    await sleep(SPEED / 2);
                    if (arr[j] < arr[minIdx]) {
                        minIdx = j;
                        await updateExp(id, `Encontramos um novo valor menor: <span class="highlight-code">${arr[minIdx]}</span>.`);
                    }
                }

                if (minIdx !== i) {
                    await updateExp(id, `Trocando o menor valor <span class="highlight-code">${arr[minIdx]}</span> com o início <span class="highlight-code">${arr[i]}</span>.`);
                    renderNumbers(id, arr, [], [i, minIdx], sortedIndices);
                    await sleep(SPEED);
                    [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
                }
                sortedIndices.push(i);
                renderNumbers(id, arr, [], [], sortedIndices);
                await sleep(SPEED);
            }
            await updateExp(id, "Ordenado! Sempre buscamos o menor e colocamos na primeira posição livre.");
            document.getElementById(`status-${id}`).textContent = "Concluído";
        }

        async function insertionSort(arr, id) {
            const n = arr.length;
            let sortedIndices = [0];
            document.getElementById(`status-${id}`).textContent = "Ordenando...";
            renderNumbers(id, arr, [], [], [0]);

            for (let i = 1; i < n; i++) {
                let key = arr[i];
                let j = i - 1;
                
                await updateExp(id, `Pegamos o número <span class="highlight-code">${key}</span> e vamos encaixá-lo na parte ordenada.`);
                renderNumbers(id, arr, [i], [], sortedIndices);
                await sleep(SPEED);

                while (j >= 0 && arr[j] > key) {
                    await updateExp(id, `<span class="highlight-code">${arr[j]}</span> é maior que <span class="highlight-code">${key}</span>, movendo para a direita.`);
                    arr[j + 1] = arr[j];
                    renderNumbers(id, arr, [j], [j+1], sortedIndices);
                    j = j - 1;
                    await sleep(SPEED);
                }
                arr[j + 1] = key;
                sortedIndices = Array.from({length: i + 1}, (_, k) => k);
                await updateExp(id, `Encaixamos o <span class="highlight-code">${key}</span> na posição correta.`);
                renderNumbers(id, arr, [], [j + 1], sortedIndices);
                await sleep(SPEED);
            }
            await updateExp(id, "Ordenado! Como organizar cartas na mão: pegamos uma e inserimos no lugar certo.");
            document.getElementById(`status-${id}`).textContent = "Concluído";
        }

    </script>
</body>
</html>
