<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort Explorer | Didática Visual</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #161b2a;
            --primary: #38bdf8;
            --secondary: #818cf8;
            --accent: #f472b6;
            --success: #4ade80;
            --warning: #fbbf24;
            --purple: #a855f7;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #2d3748;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
            max-width: 800px;
        }

        h1 {
            font-family: 'Fira Code', monospace;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .controls {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.2rem;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }

        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--secondary);
            font-weight: bold;
        }

        input, select {
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 0.7rem;
            border-radius: 8px;
            outline: none;
            font-family: 'Fira Code', monospace;
            width: 100%;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover { filter: brightness(1.1); }

        .main-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
        }

        .sort-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .sort-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .sort-name { font-family: 'Fira Code', monospace; color: var(--accent); font-size: 0.9rem; }
        
        .timer-badge {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--primary);
        }

        .numbers-display {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .num-box {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            transition: all 0.2s;
            font-weight: bold;
        }

        .num-box.comparing { border-color: var(--warning); background: rgba(251, 191, 36, 0.1); }
        .num-box.swapping { border-color: var(--accent); background: rgba(244, 114, 182, 0.2); transform: scale(1.1); }
        .num-box.min-found { border-color: var(--purple); background: rgba(168, 85, 247, 0.2); box-shadow: 0 0 10px var(--purple); }
        .num-box.sorted { border-color: var(--success); color: var(--success); }

        .explanation {
            background: #0b0f1a;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.4;
            min-height: 80px;
            border-left: 3px solid var(--primary);
            color: var(--text-dim);
        }

        .rank-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--warning);
            color: black;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.75rem;
            display: none;
            z-index: 10;
        }

        .highlight { font-weight: bold; color: var(--primary); }
        .h-purple { color: var(--purple); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>{ sort_explorer }</h1>
    </header>

    <div class="controls">
        <div class="input-group">
            <label>Nº de Itens (4-15)</label>
            <input type="number" id="listSize" value="8" min="4" max="15">
        </div>
        <div class="input-group">
            <label>Algoritmo</label>
            <select id="algorithm" onchange="resetToDefault()">
                <option value="bubble">Bubble Sort</option>
                <option value="insertion">Insertion Sort</option>
                <option value="selection">Selection Sort</option>
                <option value="compare">Comparar Todos</option>
            </select>
        </div>
        <div class="input-group">
            <label>Velocidade</label>
            <input type="range" id="speed" min="100" max="2000" value="800" style="direction: rtl;">
        </div>
        <button onclick="startSimulation()">Iniciar</button>
    </div>

    <div class="main-container" id="container"></div>

    <script>
        let currentSession = 0;
        let results = [];
        let isComparing = false;
        let useDefaultList = true; 
        const defaultList = [4, 5, 6, 1, 8, 7, 2, 3];

        // Inicialização ao carregar a página
        window.onload = () => {
            resetToDefault();
        };

        // Reseta tudo para o estado padrão (Lista específica e 8 itens)
        function resetToDefault() {
            currentSession++; // Interrompe animações
            useDefaultList = true;
            document.getElementById('listSize').value = 8;
            updateView(defaultList);
        }

        // Chamado quando o usuário mexe no número de itens manualmente
        document.getElementById('listSize').addEventListener('input', function() {
            currentSession++; // Interrompe animações ao mudar número
            useDefaultList = false;
            if (this.value > 15) this.value = 15;
            if (this.value < 4) this.value = 4;
            
            // Gera uma prévia aleatória para o usuário ver
            let previewList = generateUniqueList(parseInt(this.value));
            updateView(previewList);
        });

        function updateView(list) {
            const mode = document.getElementById('algorithm').value;
            const container = document.getElementById('container');
            container.innerHTML = '';
            
            if (mode === 'compare') {
                container.innerHTML = createCard('bubble', 'Bubble Sort') + 
                                    createCard('selection', 'Selection Sort') + 
                                    createCard('insertion', 'Insertion Sort');
                render('bubble', list);
                render('selection', list);
                render('insertion', list);
            } else {
                const names = {bubble: 'Bubble Sort', selection: 'Selection Sort', insertion: 'Insertion Sort'};
                container.innerHTML = createCard(mode, names[mode]);
                render(mode, list);
            }
        }

        function sleep() {
            return new Promise(resolve => setTimeout(resolve, document.getElementById('speed').value));
        }

        function generateUniqueList(size) {
            let set = new Set();
            while(set.size < size) set.add(Math.floor(Math.random() * 89) + 10);
            return Array.from(set);
        }

        function createCard(id, name) {
            return `
                <div class="sort-card" id="card-${id}">
                    <div class="rank-badge" id="rank-${id}"></div>
                    <div class="sort-header">
                        <span class="sort-name">// ${name}</span>
                        <span class="timer-badge" id="time-${id}">0.00s</span>
                    </div>
                    <div class="numbers-display" id="display-${id}"></div>
                    <div class="explanation" id="exp-${id}">Aguardando início...</div>
                </div>
            `;
        }

        function render(id, arr, states = {}) {
            const container = document.getElementById(`display-${id}`);
            if(!container) return;
            const { active = [], swapping = [], sorted = [], minIdx = null } = states;
            container.innerHTML = arr.map((val, idx) => {
                let cls = 'num-box';
                if (swapping.includes(idx)) cls += ' swapping';
                else if (idx === minIdx) cls += ' min-found';
                else if (active.includes(idx)) cls += ' comparing';
                if (sorted.includes(idx)) cls += ' sorted';
                return `<div class="${cls}">${val}</div>`;
            }).join('');
        }

        function updateExp(id, msg) {
            const el = document.getElementById(`exp-${id}`);
            if(el) el.innerHTML = `<span>> </span>${msg}`;
        }

        async function startSimulation() {
            currentSession++;
            const session = currentSession;
            const mode = document.getElementById('algorithm').value;
            const sizeInput = document.getElementById('listSize');
            isComparing = (mode === 'compare');
            results = [];

            let list;
            if (useDefaultList && parseInt(sizeInput.value) === 8) {
                list = [...defaultList];
            } else {
                list = generateUniqueList(parseInt(sizeInput.value));
            }

            // Atualiza a tela com a lista que será usada antes de começar
            updateView(list);

            if (isComparing) {
                bubbleSort([...list], 'bubble', session);
                selectionSort([...list], 'selection', session);
                insertionSort([...list], 'insertion', session);
            } else {
                if(mode === 'bubble') bubbleSort([...list], 'bubble', session);
                if(mode === 'selection') selectionSort([...list], 'selection', session);
                if(mode === 'insertion') insertionSort([...list], 'insertion', session);
            }
        }

        function startTimer(id, session) {
            let start = performance.now();
            let timerInterval = setInterval(() => {
                if (session !== currentSession || document.getElementById(`exp-${id}`).innerText.includes("Finalizado")) {
                    clearInterval(timerInterval);
                    return;
                }
                let now = performance.now();
                document.getElementById(`time-${id}`).textContent = ((now - start) / 1000).toFixed(2) + 's';
            }, 50);
            return start;
        }

        function handleFinish(id, startTime, session) {
            if (session !== currentSession) return;
            const duration = (performance.now() - startTime) / 1000;
            updateExp(id, "<b>Finalizado</b>");
            
            if (isComparing) {
                results.push({ id, duration });
                results.sort((a, b) => a.duration - b.duration);
                results.forEach((res, index) => {
                    const badge = document.getElementById(`rank-${res.id}`);
                    if(badge) {
                        badge.style.display = 'block';
                        badge.textContent = `${index + 1}º Lugar`;
                        badge.style.background = index === 0 ? 'var(--success)' : 'var(--warning)';
                    }
                });
            }
        }

        // Algoritmos (Mantidos conforme solicitado)
        async function bubbleSort(arr, id, session) {
            const start = startTimer(id, session);
            let n = arr.length; let sorted = [];
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    if (session !== currentSession) return;
                    updateExp(id, `Comparando <span class="highlight">${arr[j]}</span> e <span class="highlight">${arr[j+1]}</span>.`);
                    render(id, arr, { active: [j, j+1], sorted });
                    await sleep();
                    if (arr[j] > arr[j+1]) {
                        updateExp(id, `Troca: <span class="highlight">${arr[j]}</span> é maior que <span class="highlight">${arr[j+1]}</span>.`);
                        render(id, arr, { swapping: [j, j+1], sorted });
                        await sleep();
                        [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
                        render(id, arr, { active: [j, j+1], sorted });
                        await sleep();
                    }
                }
                sorted.push(n - 1 - i);
            }
            handleFinish(id, start, session);
            render(id, arr, { sorted: Array.from(arr.keys()) });
        }

        async function selectionSort(arr, id, session) {
            const start = startTimer(id, session);
            let n = arr.length; let sorted = [];
            for (let i = 0; i < n; i++) {
                let minIdx = i;
                updateExp(id, `Buscando o menor valor.`);
                render(id, arr, { active: [i], sorted, minIdx });
                await sleep();
                for (let j = i + 1; j < n; j++) {
                    if (session !== currentSession) return;
                    updateExp(id, `Comparando com <span class="highlight">${arr[j]}</span>. Menor: <span class="h-purple">${arr[minIdx]}</span>.`);
                    render(id, arr, { active: [j], sorted, minIdx });
                    await sleep();
                    if (arr[j] < arr[minIdx]) {
                        minIdx = j;
                        updateExp(id, `Novo menor: <span class="h-purple">${arr[minIdx]}</span>!`);
                        render(id, arr, { active: [j], sorted, minIdx });
                        await sleep();
                    }
                }
                if (minIdx !== i) {
                    updateExp(id, `Trocando o menor <span class="h-purple">${arr[minIdx]}</span> com a posição <span class="highlight">${i}</span>.`);
                    render(id, arr, { swapping: [i, minIdx], sorted });
                    await sleep();
                    [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
                }
                sorted.push(i);
                render(id, arr, { sorted });
            }
            handleFinish(id, start, session);
        }

        async function insertionSort(arr, id, session) {
            const start = startTimer(id, session);
            let n = arr.length; let sorted = [0];
            for (let i = 1; i < n; i++) {
                let key = arr[i]; let j = i - 1;
                updateExp(id, `Pegamos o <span class="highlight">${key}</span> para inserir na ordem.`);
                render(id, arr, { active: [i], sorted });
                await sleep();
                while (j >= 0 && arr[j] > key) {
                    if (session !== currentSession) return;
                    updateExp(id, `Movendo <span class="highlight">${arr[j]}</span> para abrir espaço.`);
                    arr[j+1] = arr[j];
                    render(id, arr, { active: [j], swapping: [j+1], sorted });
                    j--; await sleep();
                }
                arr[j+1] = key;
                sorted = Array.from({length: i+1}, (_, k) => k);
                updateExp(id, `Encaixamos o <span class="highlight">${key}</span> na posição correta.`);
                render(id, arr, { swapping: [j+1], sorted });
                await sleep();
            }
            handleFinish(id, start, session);
            render(id, arr, { sorted: Array.from(arr.keys()) });
        }
    </script>
</body>
</html>
